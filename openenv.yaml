spec_version: 1
name: heat_treatment_scheduler
type: space
runtime: fastapi
app: server.app:app
port: 8000
description: "An industrial process control environment for High-Entropy Alloy nanoprecipitate growth."
author: "Mukund Kumar's team"
tags: ["scheduling", "process-control", "physics-simulation"]
tasks:
  - name: "easy-bake"
    description: "Grow Al-2024 precipitates to ~12.5nm in a lab-scale sample (σ_T=1°C)."
  - name: "medium-bake"
    description: "Grow Steel 1095 precipitates to ~6.5nm in an industrial billet (σ_T=2°C)."
  - name: "hard-bake"
    description: "Grow Ti-6Al-4V precipitates to ~22.5nm in a massive casting (σ_T=3°C)."